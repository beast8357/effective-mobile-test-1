services:
  postgres:
    image: postgres:16-alpine
    container_name: subscriptions-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-subscriptions}
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-subscriptions}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: subscriptions-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_PORT: ${HTTP_PORT:-8080}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-subscriptions}
      DB_SSLMODE: disable
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${HTTP_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  pgdata:
